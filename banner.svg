<svg width="800" height="220" viewBox="0 0 800 220" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-labelledby="title desc">
  <title id="title">Douglas Ejiroghene Dominic banner</title>
  <desc id="desc">A dark teal gradient banner with animated typing text.</desc>

  <defs>
