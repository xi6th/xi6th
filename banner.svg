<svg width="800" height="220" viewBox="0 0 800 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Douglas Ejiroghene Dominic banner</title>
  <desc id="desc">A dark teal gradient banner with animated typing text.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A1220"/>
      <stop offset="0.55" stop-color="#0F3A3A"/>
      <stop offset="1" stop-color="#0E5A5A"/>
    </linearGradient>

    <linearGradient id="glow" x1="120" y1="70" x2="680" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#34D399" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.0"/>
    </linearGradient>

    <clipPath id="typingMask">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" values="0;0;620;620;0" keyTimes="0;0.12;0.58;0.88;1" dur="8s" repeatCount="indefinite" />
      </rect>
    </clipPath>

    <clipPath id="roleMask">
      <rect x="0" y="0" width="0" height="40">
        <animate attributeName="width" values="0;0;520;520;0" keyTimes="0;0.55;0.82;0.94;1" dur="8s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <rect width="800" height="220" fill="url(#bg)" />
  <path d="M0 182C92 168 165 188 248 178C340 166 405 136 498 146C586 155 650 179 800 162V220H0V182Z" fill="#06111C" fill-opacity="0.5" />
  <path d="M0 196C108 181 186 198 270 191C370 182 430 159 530 167C625 175 690 194 800 180V220H0V196Z" fill="#091625" fill-opacity="0.65" />
  <ellipse cx="405" cy="96" rx="250" ry="70" fill="url(#glow)" />

  <g clip-path="url(#typingMask)">
    <text x="400" y="106" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="0.5">
      DOUGLAS EJIROGHENE DOMINIC
    </text>
  </g>

  <g clip-path="url(#roleMask)">
    <text x="400" y="138" text-anchor="middle" fill="#D6FBF1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="2">
      ENGINEERING LEAD | GEOLOGY &amp; COMPUTATIONAL SYSTEMS
    </text>
  </g>

  <rect x="160" y="147" width="480" height="2" fill="#4DE1C1" fill-opacity="0.18" />
  <rect x="160" y="147" width="10" height="2" fill="#4DE1C1">
    <animate attributeName="x" values="160;630;160" dur="8s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;1;0;1" dur="8s" repeatCount="indefinite" />
  </rect>
</svg>
